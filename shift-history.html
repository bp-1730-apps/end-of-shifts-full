<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift History — Novus Foods Plant 1730</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#fff;--g50:#f8f9fb;--g100:#f1f3f6;--g200:#e2e6ec;--g300:#cdd3dc;
  --g400:#a0aab8;--g500:#6b7a8d;--g600:#4a5568;--g700:#334155;--g800:#1e293b;--g900:#0f172a;
  --brand:#1a5632;--brand-l:#e8f5ee;--brand-m:#2d7a4a;
  --accent:#b8860b;--accent-l:#fdf6e3;--accent-b:#e2c97e;
  --r:10px;--rs:6px;
  --fb:'DM Sans',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  --sh:0 4px 12px rgba(15,23,42,.07),0 1px 3px rgba(15,23,42,.05);
}
html{font-size:15px}
body{font-family:var(--fb);background:var(--g100);color:var(--g800);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* header */
.hdr{background:var(--brand);color:#fff;display:flex;align-items:center;gap:1.2rem;padding:1.4rem 1.8rem;border-radius:var(--r) var(--r) 0 0;position:relative;box-shadow:var(--sh)}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#daa520,var(--accent))}
.hdr img{height:44px;width:auto;object-fit:contain;flex-shrink:0;background:#fff;border-radius:6px;padding:4px 8px}
.hdr-text h1{font-size:1.25rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.1rem}
.hdr-text .sub{font-size:.73rem;opacity:.72;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.hdr-nav{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.hdr-back{display:inline-flex;align-items:center;gap:.35rem;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.75);text-decoration:none;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:.3rem .8rem;transition:background .15s}
.hdr-back:hover{background:rgba(255,255,255,.2);color:#fff}

/* toolbar */
.toolbar{background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:1rem;padding:.9rem 1.4rem;flex-wrap:wrap}
.type-tabs{display:flex;gap:0;border:1px solid var(--g200);border-radius:var(--rs);overflow:hidden}
.type-tab{padding:.45rem 1.1rem;font-size:.82rem;font-weight:600;border:none;background:var(--g50);color:var(--g500);cursor:pointer;transition:background .15s,color .15s;border-right:1px solid var(--g200)}
.type-tab:last-child{border-right:none}
.type-tab.active{background:var(--brand);color:#fff}
.date-range{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.date-range label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--g500)}
.date-range input[type=date]{background:var(--white);border:1px solid var(--g300);border-radius:var(--rs);color:var(--g800);font-family:var(--fb);font-size:.85rem;padding:.4rem .6rem;outline:none}
.date-range input[type=date]:focus{border-color:var(--brand-m);box-shadow:0 0 0 3px var(--brand-l)}
.toolbar-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:600;padding:.45rem 1rem;border-radius:var(--rs);border:none;cursor:pointer;transition:background .15s}
.btn-load{background:var(--brand);color:#fff}.btn-load:hover{background:var(--brand-m)}
.btn-export{background:var(--g100);color:var(--g700);border:1px solid var(--g200)}.btn-export:hover{background:var(--g200)}
.btn-export:disabled{opacity:.4;cursor:not-allowed}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:.6rem}
.record-count{font-size:.75rem;color:var(--g400);font-weight:500}

/* summary context label */
.sum-context{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g500);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.sum-context::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--brand);flex-shrink:0}

/* summary cards */
.summary-row{display:grid;gap:.75rem;margin-bottom:1.25rem}
.summary-row.prod{grid-template-columns:repeat(auto-fit,minmax(110px,1fr))}
.summary-row.batch{grid-template-columns:repeat(5,1fr)}
.sum-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--rs);padding:.7rem .9rem;box-shadow:var(--sh)}
.sum-card .sk{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);margin-bottom:.25rem}
.sum-card .sv{font-family:var(--fm);font-weight:700;font-size:1.05rem;color:var(--g800);line-height:1}
.sum-card .ss{font-size:.68rem;color:var(--g400);margin-top:.15rem}
.sum-card.pos .sv{color:var(--brand)}
.sum-card.neg .sv{color:#dc2626}

/* week strip — horizontal day cards */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem;margin-bottom:1rem}
.day-btn{background:var(--white);border:1px solid var(--g200);border-radius:var(--rs);padding:.65rem .5rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s,box-shadow .15s;user-select:none;position:relative}
.day-btn:hover:not(.day-btn-empty){border-color:var(--brand-m);background:var(--brand-l)}
.day-btn.active{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(26,86,50,.25)}
.day-btn.active .db-name,.day-btn.active .db-date,.day-btn.active .db-sup{color:#fff!important;opacity:.9}
.day-btn.active .db-chip{background:rgba(255,255,255,.2);color:#fff}
.day-btn-empty{opacity:.45;cursor:default;border-style:dashed}
.db-name{font-size:.78rem;font-weight:700;color:var(--g800);margin-bottom:.15rem}
.db-date{font-size:.68rem;color:var(--g400);font-family:var(--fm);margin-bottom:.35rem}
.db-sup{font-size:.65rem;color:var(--g500);margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-chip{display:inline-block;font-size:.65rem;font-weight:700;padding:.15rem .4rem;border-radius:3px;margin-top:.1rem}
.db-chip-green{background:var(--brand-l);color:var(--brand)}
.db-chip-amber{background:var(--accent-l);color:var(--accent)}
.db-chip-red{background:#fef2f2;color:#dc2626}
.db-chip-gray{background:var(--g100);color:var(--g500)}
.db-no-shift{font-size:.65rem;color:var(--g400);font-style:italic;margin-top:.25rem}

/* future day buttons */
.day-btn-future{border-style:dashed;border-color:var(--accent-b);background:var(--accent-l)}
.day-btn-future:hover{border-color:var(--accent)!important;background:#faebc6!important}
.day-btn-future.active{background:var(--g800)!important;border-color:var(--g800)!important;border-style:solid}
.day-btn-future .db-name{color:var(--accent)}
.db-future-tag{font-size:.6rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem}

/* projection panel */
.proj-panel{background:var(--white);border:1px solid var(--accent-b);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.proj-hdr{background:var(--g800);color:#fff;padding:.75rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.proj-hdr-left{display:flex;align-items:center;gap:.65rem}
.proj-icon{font-size:1.1rem}
.proj-title{font-size:.95rem;font-weight:700}
.proj-subtitle{font-size:.72rem;opacity:.6;margin-top:.1rem}
.proj-badge{background:var(--accent);color:#fff;border-radius:10px;padding:.2rem .65rem;font-size:.68rem;font-weight:700}
.proj-body{padding:1.2rem 1.3rem}

/* projection stat cards */
.proj-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;margin-bottom:1.25rem}
.proj-stat{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:.7rem .85rem}
.proj-stat .pk{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--g400);margin-bottom:.25rem}
.proj-stat .pv{font-family:var(--fm);font-weight:700;font-size:1.05rem;color:var(--g800);line-height:1}
.proj-stat .ps{font-size:.68rem;color:var(--g400);margin-top:.2rem}
.proj-stat.proj-good .pv{color:var(--brand)}
.proj-stat.proj-warn .pv{color:var(--accent)}
.proj-stat.proj-bad  .pv{color:#dc2626}

/* confidence band */
.conf-band{display:flex;align-items:center;gap:.5rem;background:var(--accent-l);border:1px solid var(--accent-b);border-radius:var(--rs);padding:.55rem .85rem;margin-bottom:1.25rem;font-size:.8rem;flex-wrap:wrap;gap:.75rem}
.conf-band .cb-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);flex-shrink:0}
.conf-band .cb-range{font-family:var(--fm);font-weight:700;font-size:.95rem;color:var(--g800)}
.conf-band .cb-sub{font-size:.7rem;color:var(--g500)}

/* model insights */
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.model-card{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:.8rem 1rem}
.model-card .mc-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g500);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.model-card .mc-title::after{content:'';flex:1;height:1px;background:var(--g200)}
.model-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem;font-size:.8rem}
.model-lbl{color:var(--g500)}
.model-val{font-family:var(--fm);font-weight:700;font-size:.82rem;color:var(--g800)}
.model-val.good{color:var(--brand)}
.model-val.bad{color:#dc2626}
.model-val.warn{color:var(--accent)}

/* trend chart */
.trend-chart-wrap{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:.8rem 1rem}
.trend-chart-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g500);margin-bottom:.65rem}
.trend-svg{width:100%;display:block}

/* data notice */
.data-notice{font-size:.72rem;color:var(--g400);font-style:italic;margin-top:.75rem;text-align:center}


.detail-panel{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.detail-panel-hdr{background:var(--g800);color:#fff;padding:.75rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.dp-title{font-size:.95rem;font-weight:700;letter-spacing:-.01em}
.dp-meta{font-size:.75rem;opacity:.7}
.detail-panel-empty{padding:3rem;text-align:center;color:var(--g400);font-size:.88rem}
.detail-panel-empty svg{display:block;margin:0 auto .75rem;opacity:.3}

/* detail sections inside a shift */
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-bottom:1px solid var(--g200)}
.detail-section{padding:1rem 1.2rem;border-right:1px solid var(--g200)}
.detail-section:last-child{border-right:none}
.detail-section.full{grid-column:1/-1;border-right:none}
.detail-section.half{grid-column:span 1}
.ds-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--brand);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.ds-title::after{content:'';flex:1;height:1px;background:var(--g200)}
.ds-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem;font-size:.8rem}
.ds-lbl{color:var(--g500);font-weight:500}
.ds-val{font-family:var(--fm);font-weight:700;font-size:.82rem;color:var(--g800)}
.ds-val.pos{color:var(--brand)}
.ds-val.neg{color:#dc2626}
.ds-text{font-size:.8rem;color:var(--g700);line-height:1.5;margin-top:.2rem}
.ds-empty{font-size:.75rem;color:var(--g400);font-style:italic}
.badge-sm{display:inline-block;padding:.1rem .4rem;border-radius:3px;font-size:.68rem;font-weight:700}
.badge-green{background:var(--brand-l);color:var(--brand)}
.badge-amber{background:var(--accent-l);color:var(--accent)}
.badge-red{background:#fef2f2;color:#dc2626}
.badge-gray{background:var(--g100);color:var(--g500)}

/* line table */
.line-table{width:100%;border-collapse:collapse;font-size:.78rem}
.line-table th{background:var(--g50);padding:.4rem .75rem;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--g500);text-align:left;border-bottom:1px solid var(--g200)}
.line-table th.c{text-align:center}
.line-table td{padding:.45rem .75rem;border-bottom:1px solid var(--g100);vertical-align:middle}
.line-table td.c{text-align:center;font-family:var(--fm);font-size:.76rem}
.line-table tr:last-child td{border-bottom:none}
.line-name{font-family:var(--fm);font-weight:700;color:var(--brand);font-size:.8rem}
.line-offline{color:var(--g400);font-style:italic}
.var-pos{color:var(--brand);font-weight:700}
.var-neg{color:#dc2626;font-weight:700}

/* week navigator */
.week-nav{display:flex;align-items:center;gap:0;border:1px solid var(--g200);border-radius:var(--rs);overflow:hidden;background:var(--white)}
.week-nav-btn{width:34px;height:36px;border:none;background:var(--g50);color:var(--g600);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;line-height:1}
.week-nav-btn:hover{background:var(--g200);color:var(--g900)}
.week-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.week-nav-label{padding:0 .9rem;font-size:.82rem;font-weight:700;color:var(--g800);white-space:nowrap;line-height:36px;border-left:1px solid var(--g200);border-right:1px solid var(--g200);min-width:188px;text-align:center}
.btn-custom{background:var(--g50);color:var(--g600);border:1px solid var(--g200)}.btn-custom:hover{background:var(--g100);color:var(--g800)}
.btn-custom.active{background:var(--brand-l);color:var(--brand);border-color:#a7d5b8}


.state-box{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:3rem;text-align:center;color:var(--g400);font-size:.88rem;box-shadow:var(--sh)}
.state-box svg{display:block;margin:0 auto .75rem;opacity:.3}

@media(max-width:768px){
  .app{padding:.75rem .5rem 3rem}
  .hdr{flex-direction:column;text-align:center;padding:1.2rem 1rem}
  .hdr img{height:36px}
  .hdr-nav{margin-left:0}
  .toolbar{flex-direction:column;align-items:flex-start;gap:.65rem}
  .week-nav{width:100%}
  .week-nav-label{flex:1;min-width:0}
  .toolbar-right{margin-left:0;width:100%;justify-content:flex-end}
  .summary-row.prod{grid-template-columns:repeat(3,1fr)}
  .summary-row.batch{grid-template-columns:repeat(3,1fr)}
  .detail-grid{grid-template-columns:1fr}
  .detail-section{border-right:none;border-bottom:1px solid var(--g200)}
  .week-strip{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:480px){
  .summary-row.prod,.summary-row.batch{grid-template-columns:1fr 1fr}
  .week-strip{grid-template-columns:repeat(4,1fr)}
}

/* print */
@media print{
  body{background:white!important;margin:0}
  .app,.toolbar{display:none!important}
  #printReport{display:block!important}
}
#printReport{display:none;font-family:'DM Sans',Arial,sans-serif;font-size:9.5pt;color:#111827;background:white}
.pr-page{width:100%;max-width:900px;margin:0 auto;padding:0 18pt}
.pr-hdr{background:#1a5632;color:white;padding:12pt 18pt 10pt;display:flex;align-items:center;justify-content:space-between;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pr-hdr-left{display:flex;align-items:center;gap:10pt}
.pr-hdr img{height:30pt;width:auto;object-fit:contain;background:#fff;border-radius:3pt;padding:2pt 5pt}
.pr-hdr h1{font-size:13pt;font-weight:700;margin:0 0 1pt}
.pr-hdr .pr-sub{font-size:7pt;opacity:.7;text-transform:uppercase;letter-spacing:.07em}
.pr-hdr-right{font-size:8pt;opacity:.8;text-align:right}
.pr-gold{height:2.5pt;background:linear-gradient(90deg,#b8860b,#daa520,#b8860b);print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pr-sec{margin-top:10pt;page-break-inside:avoid}
.pr-sec-hdr{display:flex;align-items:center;gap:5pt;margin-bottom:4pt}
.pr-sec-hdr .bar{width:3pt;height:12pt;background:#1a5632;border-radius:2pt;flex-shrink:0;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pr-sec-hdr span{font-size:8.5pt;font-weight:700;color:#111827;text-transform:uppercase;letter-spacing:.04em}
.pr-sec-hdr::after{content:'';flex:1;height:1pt;background:#e2e6ec}
.pr-kpi-row{display:grid;gap:5pt;margin-bottom:7pt}
.pr-kpi-row.k3{grid-template-columns:repeat(3,1fr)}
.pr-kpi-row.k4{grid-template-columns:repeat(4,1fr)}
.pr-kpi-row.k5{grid-template-columns:repeat(5,1fr)}
.pr-kpi-row.k7{grid-template-columns:repeat(7,1fr)}
.pr-kpi{border:1pt solid #e2e6ec;border-radius:3pt;padding:5pt 7pt;background:#f8f9fb;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pr-kpi .kk{font-size:6pt;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7a8d;margin-bottom:2pt}
.pr-kpi .kv{font-size:13pt;font-weight:700;line-height:1;color:#111827}
.pr-kpi.green{background:#e8f5ee;border-color:#a7d5b8}.pr-kpi.green .kv{color:#1a5632}
.pr-kpi.amber{background:#fdf6e3;border-color:#e2c97e}.pr-kpi.amber .kv{color:#b8860b}
.pr-kpi.red{background:#fef2f2;border-color:#fca5a5}.pr-kpi.red .kv{color:#dc2626}
.pr-kpi.neutral .kv{color:#334155}
.pr-notes{background:#f8f9fb;border-left:2.5pt solid #1a5632;padding:4pt 7pt;border-radius:0 3pt 3pt 0;margin-bottom:5pt;font-size:8pt;color:#334155;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pr-notes .nk{font-size:6pt;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7a8d;margin-bottom:1pt}
.pr-table{width:100%;border-collapse:collapse;font-size:7.5pt;margin-bottom:6pt}
.pr-table th{background:#1a5632;color:white;padding:4pt 6pt;text-align:left;font-size:6.5pt;font-weight:700;text-transform:uppercase;letter-spacing:.03em;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pr-table th.c{text-align:center}
.pr-table td{padding:4pt 6pt;border-bottom:1pt solid #e2e6ec;vertical-align:middle}
.pr-table td.c{text-align:center}
.pr-table tr:nth-child(even) td{background:#f8f9fb;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pr-table .ln{font-weight:700;color:#1a5632;font-family:monospace}
.pr-table .vp{font-weight:700;color:#1a5632}
.pr-table .vn{font-weight:700;color:#dc2626}
.pr-table .lo{font-weight:700;color:#a0aab8}
.badge{display:inline-block;padding:1pt 4pt;border-radius:2pt;font-size:6.5pt;font-weight:700;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.badge-green{background:#e8f5ee;color:#1a5632}
.badge-amber{background:#fdf6e3;color:#b8860b}
.badge-red{background:#fef2f2;color:#dc2626}
.badge-gray{background:#f1f3f6;color:#4a5568}
.pr-shift-break{page-break-before:always;margin-top:0}
.pr-footer{margin-top:12pt;padding-top:5pt;border-top:1pt solid #e2e6ec;display:flex;justify-content:space-between;font-size:6.5pt;color:#a0aab8}
/* ── TOOLTIP COMPONENT ── */
.tt-wrap{display:inline-flex;align-items:center;gap:.3rem}
.tt-btn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--g200);color:var(--g500);font-size:.6rem;font-weight:700;cursor:pointer;border:none;line-height:1;flex-shrink:0;transition:background .15s,color .15s;font-family:var(--fb)}
.tt-btn:hover{background:var(--brand-l);color:var(--brand)}
.tt-pop{position:fixed;z-index:9999;background:var(--g900);color:#fff;border-radius:8px;padding:.85rem 1rem;font-size:.78rem;line-height:1.55;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.25);pointer-events:none;opacity:0;transition:opacity .15s}
.tt-pop.visible{opacity:1;pointer-events:auto}
.tt-pop strong{color:#fff;font-weight:700}
.tt-pop .tt-good{color:#6ee7b7;font-weight:600}
.tt-pop .tt-bad{color:#fca5a5;font-weight:600}
.tt-pop .tt-action{color:#fde68a;font-weight:600}
.tt-pop hr{border:none;border-top:1px solid rgba(255,255,255,.15);margin:.5rem 0}

</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <img src="image.png" id="logoImg" alt="Novus Foods">
    <div class="hdr-text">
      <h1>Shift History</h1>
      <div class="sub">Plant 1730 &bull; Buena Park, CA</div>

// ML PROJECTION ENGINE
// ═══════════════════════════════════════════════════════

let historicalCache = null;
const DAY_NAMES_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

async function fetchHistorical(){
  if(historicalCache) return historicalCache;
  const rows = await sbGet('eos_production_shifts',
    'select=shift_date,lbs_planned,lbs_produced,lbs_variance,headcount_needed,headcount_present,cases_planned,cases_produced');
  historicalCache = rows.sort((a,b)=>a.shift_date.localeCompare(b.shift_date));
  return historicalCache;
}

function expWeights(n, alpha=0.12){
  const w=[];
  for(let i=0;i<n;i++) w.push(Math.exp(-alpha*(n-1-i)));
  const s=w.reduce((a,b)=>a+b,0);
  return w.map(v=>v/s);
}
function wMean(vals,weights){ return vals.reduce((s,v,i)=>s+v*weights[i],0); }
function wStd(vals,mean,weights){ return Math.sqrt(vals.reduce((s,v,i)=>s+weights[i]*(v-mean)**2,0)); }

function cramersRule3(A,b){
  const det=M=>M[0][0]*(M[1][1]*M[2][2]-M[1][2]*M[2][1])-M[0][1]*(M[1][0]*M[2][2]-M[1][2]*M[2][0])+M[0][2]*(M[1][0]*M[2][1]-M[1][1]*M[2][0]);
  const d=det(A); if(Math.abs(d)<1e-10) return null;
  const rep=(col,v)=>A.map((row,i)=>row.map((val,j)=>j===col?v[i]:val));
  return [det(rep(0,b))/d,det(rep(1,b))/d,det(rep(2,b))/d];
}

function wls(data,weights){
  const n=data.length; if(n<3) return null;
  let sx1=0,sx2=0,sy=0,sx1x1=0,sx1x2=0,sx2x2=0,sx1y=0,sx2y=0,sw=0;
  data.forEach(({x1,x2,y},i)=>{
    const w=weights[i];
    sx1+=w*x1;sx2+=w*x2;sy+=w*y;sx1x1+=w*x1*x1;sx1x2+=w*x1*x2;
    sx2x2+=w*x2*x2;sx1y+=w*x1*y;sx2y+=w*x2*y;sw+=w;
  });
  const coeffs=cramersRule3([[sw,sx1,sx2],[sx1,sx1x1,sx1x2],[sx2,sx1x2,sx2x2]],[sy,sx1y,sx2y]);
  if(!coeffs) return null;
  const [c,a,b]=coeffs;
  const predict=(x1,x2)=>a*x1+b*x2+c;
  const residuals=data.map(({x1,x2,y})=>y-predict(x1,x2));
  return {a,b,c,predict,residuals};
}

function dowMultipliers(rows){
  const byDow={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
  rows.forEach(r=>{ if(!r.lbs_planned||!r.lbs_produced) return; const dow=new Date(r.shift_date+'T12:00:00').getDay(); byDow[dow].push(r.lbs_produced/r.lbs_planned); });
  const gAll=rows.filter(r=>r.lbs_planned).map(r=>r.lbs_produced/r.lbs_planned);
  const gm=gAll.length?gAll.reduce((a,b)=>a+b,0)/gAll.length:1;
  const mult={};
  for(let d=0;d<7;d++) mult[d]=byDow[d].length>=2?byDow[d].reduce((a,b)=>a+b,0)/byDow[d].length/gm:1;
  return mult;
}

function deficitRecovery(rows){
  const gains=[];
  for(let i=1;i<rows.length;i++){
    if((rows[i-1].lbs_variance||0)<0) gains.push((rows[i].lbs_produced||0)-(rows[i-1].lbs_produced||0));
  }
  if(!gains.length) return null;
  return {avgGainPerShift:gains.reduce((a,b)=>a+b,0)/gains.length, n:gains.length};
}

function renderTrendChart(rows,projVal,ciLow,ciHigh){
  if(!rows.length) return '';
  const W=760,H=165,PL=46,PR=18,PT=14,PB=30,IW=W-PL-PR,IH=H-PT-PB;
  const vals=rows.map(r=>r.lbs_produced||0);
  const allV=[...vals,projVal,ciLow,ciHigh];
  const minV=Math.min(...allV)*0.92, maxV=Math.max(...allV)*1.06;
  const sy=v=>PT+IH-((v-minV)/(maxV-minV))*IH;
  const sx=(i,tot)=>PL+(i/(tot-1))*IW;
  const total=rows.length+1;
  const pts=rows.map((r,i)=>({x:sx(i,total),y:sy(r.lbs_produced||0),lbl:dayShort(r.shift_date)}));
  const projX=sx(rows.length,total),projY=sy(projVal),ciLY=sy(ciLow),ciHY=sy(ciHigh);
  const ticks=3; let yT='';
  for(let i=0;i<=ticks;i++){const v=minV+(maxV-minV)*(i/ticks);const y=sy(v);yT+=`<line x1="${PL-4}" y1="${y}" x2="${PL}" y2="${y}" stroke="var(--g300)" stroke-width="1"/><text x="${PL-7}" y="${y+4}" font-size="9" text-anchor="end" fill="var(--g400)">${Math.round(v/1000)}k</text>`;}
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const lp=pts[pts.length-1];
  let xL='';
  pts.forEach((p,i)=>{if(i%2===0||i===pts.length-1)xL+=`<text x="${p.x}" y="${H-5}" font-size="8.5" text-anchor="middle" fill="var(--g400)">${p.lbl}</text>`;});
  xL+=`<text x="${projX}" y="${H-5}" font-size="8.5" text-anchor="middle" fill="var(--accent)" font-weight="700">Proj</text>`;
  return `<div class="trend-chart-wrap"><div class="trend-chart-title">Last ${rows.length} Shifts — Lbs Produced + Projection</div>
  <svg class="trend-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${projX-9}" y="${ciHY}" width="18" height="${ciLY-ciHY}" fill="var(--accent-l)" stroke="var(--accent-b)" stroke-width="1" rx="2"/>
    <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="var(--g200)" stroke-width="1"/>
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="var(--g200)" stroke-width="1"/>
    ${yT}
    <path d="${line}" fill="none" stroke="var(--brand)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="${lp.x}" y1="${lp.y}" x2="${projX}" y2="${projY}" stroke="var(--accent)" stroke-width="2" stroke-dasharray="5,4"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--brand)" stroke="white" stroke-width="1.5"/>`).join('')}
    <circle cx="${projX}" cy="${projY}" r="5.5" fill="var(--accent)" stroke="white" stroke-width="2"/>
    ${xL}
  </svg></div>`;
}

async function renderProjection(dateStr){
  const panel=document.getElementById('detailPanelArea');
  panel.innerHTML=`<div class="proj-panel"><div class="proj-hdr"><div class="proj-hdr-left">
    <span class="proj-icon">🤖</span><div><div class="proj-title">${dayName(dateStr)} · ${shortDate(dateStr)}</div>
    <div class="proj-subtitle">Loading historical data…</div></div></div></div>
    <div class="proj-body"><div style="text-align:center;padding:2.5rem;color:var(--g400)">Fitting models…</div></div></div>`;
  try{
    const hist=await fetchHistorical();
    if(hist.length<5){
      panel.innerHTML=`<div class="proj-panel"><div class="proj-hdr"><div class="proj-hdr-left"><span class="proj-icon">🤖</span><div><div class="proj-title">${dayName(dateStr)} · ${shortDate(dateStr)}</div></div></div></div>
      <div class="proj-body"><div class="data-notice">Need at least 5 historical shifts to generate projections. Keep submitting!</div></div></div>`;
      return;
    }
    const n=hist.length, w=expWeights(n,0.12), dow=new Date(dateStr+'T12:00:00').getDay();
    const mult=dowMultipliers(hist), dowMult=mult[dow]||1;

    // HC efficiency
    const effR=hist.filter(r=>r.headcount_present>0&&r.lbs_produced>0).map(r=>r.lbs_produced/r.headcount_present);
    const effW=expWeights(effR.length,0.12);
    const avgEff=wMean(effR,effW), effStd=wStd(effR,avgEff,effW);

    // WLS regression
    const rd=hist.filter(r=>r.lbs_planned>0&&r.headcount_present>0&&r.lbs_produced>0).map(r=>({x1:r.lbs_planned,x2:r.headcount_present,y:r.lbs_produced}));
    const reg=wls(rd,expWeights(rd.length,0.12));

    // Baseline
    const bVals=hist.filter(r=>r.lbs_produced>0).map(r=>r.lbs_produced);
    const bW=expWeights(bVals.length,0.08), baseMean=wMean(bVals,bW), baseStd=wStd(bVals,baseMean,bW);
    const dowProj=baseMean*dowMult;

    // Typical plan for this DOW
    const sdRows=hist.filter(r=>new Date(r.shift_date+'T12:00:00').getDay()===dow).slice(-6);
    const typPlan=sdRows.length?Math.round(sdRows.reduce((s,r)=>s+(r.lbs_planned||0),0)/sdRows.length):Math.round(baseMean);

    // ── Scheduled headcount + lbs target: prefer set values over historical ──
    const DAY_COLS_PROJ=['mon','tue','wed','thu','fri','sat','sun'];
    const dowIdx     = dow===0?6:dow-1;
    const dowColHC   = 'hc_target_'+DAY_COLS_PROJ[dowIdx];
    const dowColLbs  = 'lbs_target_'+DAY_COLS_PROJ[dowIdx];
    const monStr     = isoDate(activeWeekMonday);
    let scheduledHC  = null;
    let hcSource     = 'historical median';
    let dayLbsTarget = null;  // the target set on the hub for this specific day
    try{
      const selectCols = [
        ...DAY_COLS_PROJ.map(c=>'hc_target_'+c),
        ...DAY_COLS_PROJ.map(c=>'lbs_target_'+c)
      ].join(',');
      const tgtRows = await sbGet('eos_weekly_targets',
        `week_start=eq.${monStr}&select=${selectCols}`,
        'updated_at.desc');
      if(tgtRows.length){
        const hcVal  = parseInt(tgtRows[0][dowColHC])||0;
        const lbsVal = parseInt(tgtRows[0][dowColLbs])||0;
        if(hcVal>0){ scheduledHC=hcVal; hcSource='scheduled'; }
        if(lbsVal>0){ dayLbsTarget=lbsVal; }
      }
    }catch(e){ console.warn('Could not fetch weekly targets for projection:', e.message); }

    // Fall back to historical median headcount if none scheduled
    if(!scheduledHC){
      const recentHC=hist.slice(-10).filter(r=>r.headcount_present>0).map(r=>r.headcount_present);
      scheduledHC=recentHC.length?recentHC.sort((a,b)=>a-b)[Math.floor(recentHC.length/2)]:null;
    }

    const hcProj=scheduledHC?Math.round(avgEff*scheduledHC):null;
    const regProj=reg&&scheduledHC?Math.round(reg.predict(typPlan,scheduledHC)):null;
    const projs=[dowProj,hcProj,regProj].filter(v=>v&&v>0);
    const ensemble=Math.round(projs.reduce((a,b)=>a+b,0)/projs.length);

    const resStd=reg?Math.sqrt(reg.residuals.map(r=>r*r).reduce((a,b)=>a+b,0)/reg.residuals.length):baseStd;
    const ciLow=Math.round(ensemble-resStd), ciHigh=Math.round(ensemble+resStd);

    // Deficit recovery
    const wkVar=allCurrentRows.reduce((s,r)=>s+(r.lbs_variance||0),0);
    const rec=deficitRecovery(hist);
    let catchup='';
    if(wkVar<0&&rec){
      const shifts=rec.avgGainPerShift>0?Math.ceil(Math.abs(wkVar)/rec.avgGainPerShift):null;
      catchup=shifts?`At current recovery rate, ~${shifts} more shift${shifts!==1?'s':''} to close the gap.`:'Recovery trend inconsistent.';
    } else if(wkVar>=0){ catchup='Currently ahead of plan — no deficit.'; }
    else { catchup='Not enough recovery data to project catch-up.'; }

    const attainmentBase = dayLbsTarget || typPlan;
    const projVsTarget   = dayLbsTarget ? ensemble - dayLbsTarget : null;
    const projAtt  = attainmentBase>0?Math.round((ensemble/attainmentBase)*100*PE):null;
    const attCls   = projAtt!==null?(projAtt>=90?'proj-good':projAtt>=70?'proj-warn':'proj-bad'):'';
    const gapCls   = projVsTarget!==null?(projVsTarget>=0?'proj-good':'proj-bad'):'';
    const chartRows= hist.slice(-14);

    panel.innerHTML=`<div class="proj-panel">
      <div class="proj-hdr">
        <div class="proj-hdr-left"><span class="proj-icon">🤖</span>
          <div><div class="proj-title">${dayName(dateStr)} · ${shortDate(dateStr)} — ML Projection</div>
          <div class="proj-subtitle">Ensemble of ${projs.length} models · ${n} historical shifts · Exponential recency weighting</div></div>
        </div>
        <div class="proj-badge">Projection</div>
      </div>
      <div class="proj-body">
        <div class="proj-stats">
          <div class="proj-stat">
            <div class="pk">Projected Lbs <button class="tt-btn" onclick="showTT(this,\'<strong>Projected Lbs</strong><hr>The ensemble output — average of 3 models: EWMA headcount efficiency, day-of-week pattern, and weighted regression.<hr><span class="tt-good">Close to your day target:</span> Normal day expected.<br><span class="tt-bad">Significantly below target:</span> Something is pulling it down — most likely scheduled headcount. Check the HC model card.<br><span class="tt-action">Projection well above recent actuals?</span> Models may be anchoring on older, stronger shifts. Check the trend chart.\',event)">?</button></div>
            <div class="pv">${ensemble.toLocaleString()}</div>
            <div class="ps">${projs.length}-model ensemble</div>
          </div>
          <div class="proj-stat">
            <div class="pk">Day Target <button class="tt-btn" onclick="showTT(this,\'<strong>Day Target</strong><hr>The lbs target you set for this specific day on the hub.<hr>This is your goal. The projection tells you whether the plant is expected to reach it.<br><span class="tt-bad">Not set?</span> Go to the hub and enter daily targets — without them, projected attainment uses historical averages instead of your actual plan.\',event)">?</button>${dayLbsTarget?'':' (not set)'}</div>
            <div class="pv">${dayLbsTarget?dayLbsTarget.toLocaleString():'—'}</div>
            <div class="ps">${dayLbsTarget?'set on hub':'go to hub to set'}</div>
          </div>
          <div class="proj-stat ${gapCls}">
            <div class="pk">Projected vs Target <button class="tt-btn" onclick="showTT(this,\'<strong>Projected vs Target</strong><hr>Projected Lbs minus your Day Target.<hr><span class="tt-good">Positive:</span> Models expect you to beat your target.<br><span class="tt-bad">Negative:</span> Models expect a shortfall. Identify the driver now — is it headcount (check HC model) or a structural weekday pattern (check DOW model)?<br><span class="tt-action">Act before the shift starts,</span> not after it ends.\',event)">?</button></div>
            <div class="pv">${projVsTarget!==null?(projVsTarget>=0?'+':'')+projVsTarget.toLocaleString():'—'}</div>
            <div class="ps">${projVsTarget===null?'set a day target to see this':'lbs above/below target'}</div>
          </div>
          <div class="proj-stat ${attCls}">
            <div class="pk">Projected Attainment <button class="tt-btn" onclick="showTT(this,\'<strong>Projected Attainment</strong><hr>(Projected Lbs ÷ Day Target or Typical Plan) × 0.98.<hr>PE stands for Planned Efficiency — it is the scalar that converts raw output ratio into your operational attainment standard. At 0.98, it means your benchmark is that the plant operates at 98% of theoretical capacity. <hr>In practice: if you produce exactly as many lbs as planned, your attainment is 98%, not 100%. This reflects real-world losses from minor stoppages, changeovers, speed losses, and startup time that are considered normal and acceptable. Hitting 100% attainment would require producing 2% above plan — that is your stretch target. <hr><span class='tt-good'>98% attainment on a normal day</span> means the shift ran exactly to plan with acceptable losses. <span class='tt-bad'>Below 90%</span> means losses were above normal — something specific went wrong.<hr><span class="tt-good">≥90%:</span> On track for a solid shift.<br><span class="tt-bad"><80%:</span> Warning — intervention before shift start is warranted.<br>The footnote tells you whether this used your actual day target or the historical typical plan.\',event)">?</button></div>
            <div class="pv">${projAtt!==null?projAtt+'%':'—'}</div>
            <div class="ps">vs ${dayLbsTarget?'day target':'typical plan'} · PE=${PE}</div>
          </div>
          <div class="proj-stat ${wkVar>=0?'proj-good':'proj-bad'}">
            <div class="pk">Week Gap (so far) <button class="tt-btn" onclick="showTT(this,\'<strong>Week Gap</strong><hr>Running total: lbs produced minus lbs planned across all shifts submitted this week.<hr><span class="tt-good">Positive:</span> You are ahead — this projected day can be average and the week is still fine.<br><span class="tt-bad">Negative:</span> You are carrying a hole. This projected day needs to over-perform just to stop the bleeding.<br><span class="tt-action">Combine with Deficit Recovery model</span> to see how many more shifts it takes to close if nothing changes.\',event)">?</button></div>
            <div class="pv">${wkVar>0?'+':''}${wkVar.toLocaleString()}</div>
            <div class="ps">lbs vs plan this week</div>
          </div>
        </div>
        <div class="conf-band">
          <span class="cb-lbl">Confidence Range <button class="tt-btn" onclick="showTT(this,\'<strong>Confidence Range</strong><hr>The window within which the plant will most likely land, based on how accurately the regression predicted past shifts.<hr><strong>σ (sigma)</strong> is the standard deviation of prediction errors — how far off the model typically was.<hr><span class="tt-good">Narrow band (±3,000 or less):</span> Highly consistent plant. Plan tightly.<br><span class="tt-bad">Wide band (±15,000+):</span> High variance — use this as directional only, not a precise forecast.<br><span class="tt-action">Wide band cause:</span> Irregular headcount, frequent line outages, or seasonal product changes. Address root cause to tighten it.\',event)">?</button></span>
          <span class="cb-range">${ciLow.toLocaleString()} – ${ciHigh.toLocaleString()} lbs</span>
          <span class="cb-sub">±${Math.round(resStd).toLocaleString()} lbs σ based on historical residuals</span>
        </div>
        <div class="model-grid">
          <div class="model-card">
            <div class="mc-title">Headcount Efficiency <button class="tt-btn" onclick="showTT(this,\'<strong>Headcount Efficiency Model</strong><hr>Your plant\\'s current lbs-per-person rate, exponentially weighted so recent shifts count more.<hr><strong>Avg lbs/person:</strong> The key operational rate. If this is declining week over week, something is degrading — harder products, slower operators, more downtime.<br><strong>Std dev:</strong> How consistent that rate is. <span class="tt-bad">High std dev</span> means some shifts a person produces 3,000 lbs, others 4,500 — high variability, possibly driven by line assignment or product mix.<br><strong>HC coefficient from regression:</strong> Each additional person is worth ~3,000–4,000 lbs. One absence = that many lbs lost before the shift starts.\',event)">?</button></div>
            <div class="model-row"><span class="model-lbl">Avg lbs / person</span><span class="model-val">${Math.round(avgEff).toLocaleString()}</span></div>
            <div class="model-row"><span class="model-lbl">Std dev</span><span class="model-val">±${Math.round(effStd).toLocaleString()}</span></div>
            <div class="model-row"><span class="model-lbl">HC used (${hcSource})</span><span class="model-val ${hcSource==='scheduled'?'good':''}">${scheduledHC||'—'}</span></div>
            <div class="model-row"><span class="model-lbl">HC Projection</span><span class="model-val ${hcProj?'good':''}">${hcProj?hcProj.toLocaleString():'—'}</span></div>
          </div>
          <div class="model-card">
            <div class="mc-title">Day-of-Week Pattern <button class="tt-btn" onclick="showTT(this,\'<strong>Day-of-Week Pattern</strong><hr>Measures whether this weekday historically over- or under-performs the average.<hr><strong>Multiplier > 100%:</strong> This day is structurally a strong day. The gap vs a bad actual is likely a real problem.<br><strong>Multiplier < 100%:</strong> This day is structurally weaker — Mondays typically are. A shortfall is expected, not alarming.<hr><span class="tt-action">Use this to calibrate expectations.</span> Mondays being 4% below average is normal. Mondays being 20% below average is a signal worth investigating.\',event)">?</button></div>
            <div class="model-row"><span class="model-lbl">${DAY_NAMES_FULL[dow]} multiplier</span><span class="model-val ${dowMult>=1?'good':dowMult>=0.92?'warn':'bad'}">${(dowMult*100).toFixed(1)}%</span></div>
            <div class="model-row"><span class="model-lbl">vs avg day</span><span class="model-val">${dowMult>=1?'Above avg':'Below avg'}</span></div>
            <div class="model-row"><span class="model-lbl">DOW Projection <button class="tt-btn" onclick="showTT(this,'<strong>DOW Projection</strong><hr>DOW = Day of Week. This is the standalone estimate from the day-of-week model alone, before it gets combined with the other two models. <hr>It is calculated as: <strong>historical average lbs output × this weekday\'s multiplier.</strong> For example, if your plant averages 70,000 lbs per shift and Thursday\'s multiplier is 1.03, the DOW projection is 72,100 lbs. <hr><span class="tt-action">When it disagrees sharply with the other two models,</span> it usually means today\'s headcount or plan is unusually different from the historical Thursday pattern. The ensemble average pulls it toward the center.',event)">?</button></span><span class="model-val">${Math.round(dowProj).toLocaleString()}</span></div>
          </div>
          <div class="model-card">
            <div class="mc-title">Regression (Lbs + HC) <button class="tt-btn" onclick="showTT(this,\'<strong>WLS Regression Model</strong><hr>Fits the equation: Lbs = a × Plan + b × Headcount + c across 313 historical shifts, weighting recent shifts more.<hr><strong>Plan coefficient (a):</strong> If < 0.95, the plant systematically under-delivers vs plan — plans may be set too optimistically.<br><strong>HC coefficient (b):</strong> Additional lbs per person. If b = 3,400, one absent person costs 3,400 lbs. This is actionable — it tells you the dollar value of solving an absence.<br><strong>Intercept (c):</strong> The baseline lbs the plant produces when both plan and headcount inputs are zero — in practice, think of it as the fixed contribution from the physical plant itself. Lines warmed up, materials staged, equipment running, operators in motion — all of that has a floor output value before you even count the schedule or the headcount. <hr><span class='tt-action'>If the intercept is very high</span> (e.g. 20,000+ lbs), your plant has strong fixed capacity — even a short-staffed shift produces a solid baseline. <span class='tt-bad'>If the intercept is near zero or negative,</span> it means output is almost entirely explained by plan and headcount — there is little inherent buffer. A plant with a low intercept is more vulnerable to absences and plan shortfalls because it has no fixed floor to fall back on.\',event)">?</button></div>
            ${reg?`
            <div class="model-row"><span class="model-lbl">Plan coeff</span><span class="model-val">${reg.a.toFixed(3)}</span></div>
            <div class="model-row"><span class="model-lbl">HC coeff</span><span class="model-val">${reg.b.toFixed(1)} lbs/person</span></div>
            <div class="model-row"><span class="model-lbl">Intercept</span><span class="model-val">${Math.round(reg.c).toLocaleString()}</span></div>
            <div class="model-row"><span class="model-lbl">Reg Projection</span><span class="model-val ${regProj?'good':''}">${regProj?regProj.toLocaleString():'—'}</span></div>
            `:`<div class="model-row"><span class="model-lbl">Insufficient data</span><span class="model-val bad">—</span></div>`}
          </div>
          <div class="model-card">
            <div class="mc-title">Deficit Recovery <button class="tt-btn" onclick="showTT(this,\'<strong>Deficit Recovery Model</strong><hr>Measures how the plant historically responds when it has been behind.<hr><strong>Avg gain per recovery shift:</strong> When behind, how many additional lbs the team produces on the next shift vs the previous.<br><span class="tt-good">High positive value:</span> Your team responds well to deficits — rally effect is real and measurable.<br><span class="tt-bad">Near zero or negative:</span> No meaningful recovery pattern — deficits tend to persist or worsen. Systemic issue, not motivational.<hr><span class="tt-action">Shifts to close gap:</span> Current week deficit ÷ avg recovery gain. If this number exceeds remaining shifts in the week, escalate now.\',event)">?</button></div>
            ${rec?`
            <div class="model-row"><span class="model-lbl">Avg gain / recovery shift</span><span class="model-val ${rec.avgGainPerShift>0?'good':'bad'}">${rec.avgGainPerShift>0?'+':''}${Math.round(rec.avgGainPerShift).toLocaleString()}</span></div>
            <div class="model-row"><span class="model-lbl">Recovery events</span><span class="model-val">${rec.n}</span></div>
            <div class="model-row"><span class="model-lbl">Outlook</span><span class="model-val" style="font-size:.72rem">${catchup}</span></div>
            `:`<div class="model-row"><span class="model-lbl">Insufficient recovery data</span><span class="model-val bad">—</span></div>`}
          </div>
        </div>
        ${renderTrendChart(chartRows,ensemble,ciLow,ciHigh)}
        <div class="model-card" style="grid-column:1/-1;margin-top:.25rem">
          <div class="mc-title">What the Math Is Doing</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem 1.5rem;font-size:.8rem;color:var(--g700);line-height:1.6">
            <div>
              <strong style="color:var(--g800);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em">Step 1 — Three independent estimates</strong><br>
              Each model produces a lbs estimate independently:<br>
              <span style="font-family:var(--fm);font-size:.75rem;color:var(--g600)">
                EWMA: ${Math.round(avgEff).toLocaleString()} lbs/person × ${scheduledHC||'?'} people = ${hcProj?hcProj.toLocaleString():'—'}<br>
                DOW:  baseline × ${(dowMult*100).toFixed(1)}% = ${Math.round(dowProj).toLocaleString()}<br>
                WLS:  ${reg?`(${reg.a.toFixed(3)} × ${typPlan.toLocaleString()}) + (${reg.b.toFixed(1)} × ${scheduledHC||'?'}) + ${Math.round(reg.c).toLocaleString()} = ${regProj?regProj.toLocaleString():'—'}`:'insufficient data'}
              </span>
            </div>
            <div>
              <strong style="color:var(--g800);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em">Step 2 — Ensemble average</strong><br>
              The three estimates are averaged equally:<br>
              <span style="font-family:var(--fm);font-size:.75rem;color:var(--g600)">
                (${projs.map(v=>Math.round(v).toLocaleString()).join(' + ')}) ÷ ${projs.length} = ${ensemble.toLocaleString()} lbs
              </span><br><br>
              <strong style="color:var(--g800);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em">Step 3 — Attainment</strong><br>
              <span style="font-family:var(--fm);font-size:.75rem;color:var(--g600)">
                (${ensemble.toLocaleString()} ÷ ${attainmentBase.toLocaleString()}) × ${PE} = ${projAtt!==null?projAtt+'%':'—'}<br>
                <span style="color:var(--g400)">${dayLbsTarget?'using day target from hub':'using typical '+DAY_NAMES_FULL[dow]+' plan (no day target set)'}</span>
              </span>
            </div>
            <div>
              <strong style="color:var(--g800);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em">Step 4 — Confidence interval</strong><br>
              After fitting, the regression measures how far off it was on each historical shift (residuals). The standard deviation of those errors (σ) sets the range:<br>
              <span style="font-family:var(--fm);font-size:.75rem;color:var(--g600)">
                ${ensemble.toLocaleString()} ± ${Math.round(resStd).toLocaleString()} = ${ciLow.toLocaleString()} – ${ciHigh.toLocaleString()}
              </span>
            </div>
            <div>
              <strong style="color:var(--g800);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em">Step 5 — Deficit recovery</strong><br>
              Scans all shifts where the previous shift had negative variance. Measures the average lbs gain on the following shift. Divides the current week gap by that rate:<br>
              <span style="font-family:var(--fm);font-size:.75rem;color:var(--g600)">
                ${rec?`${Math.abs(wkVar).toLocaleString()} lbs gap ÷ ${Math.round(rec.avgGainPerShift).toLocaleString()} avg gain = ${rec.avgGainPerShift>0?Math.ceil(Math.abs(wkVar)/rec.avgGainPerShift)+' shifts':'—'}`:'No recovery events in history'}
              </span>
            </div>
          </div>
        </div>

        <div class="data-notice">Statistical estimates based on ${n} historical shifts. Accuracy improves as more data accumulates. Not a production guarantee.</div>
      </div>
    </div>`;
  }catch(err){
    console.error(err);
    panel.innerHTML=`<div class="proj-panel"><div class="proj-hdr"><div class="proj-hdr-left"><span class="proj-icon">🤖</span><div><div class="proj-title">Projection Error</div></div></div></div>
    <div class="proj-body"><div class="data-notice">Could not load historical data: ${err.message}</div></div></div>`;
  }
}

function renderProdList(rows){
  currentByDate = {};
  rows.forEach(r=>{ currentByDate[r.shift_date]=r; });

  const todayStr = isoDate(new Date());
  const days=[];
  for(let i=0;i<7;i++) days.push(isoDate(addDays(activeWeekMonday,i)));

  // Build week strip
  let strip = '<div class="week-strip">';
  days.forEach((dateStr,idx)=>{
    const r        = currentByDate[dateStr];
    const isFuture = dateStr > todayStr;
    const isToday  = dateStr === todayStr;

    if(isFuture || (isToday && !r)){
      const label = isFuture ? 'Projection' : 'Today · Projection';
      strip+=`<div class="day-btn day-btn-future" id="day-btn-${idx}" onclick="selectDay(${idx},'${dateStr}')">
        <div class="db-name">${dayShort(dateStr)}</div>
        <div class="db-date">${shortDate(dateStr)}</div>
        <div class="db-future-tag">${label}</div>
      </div>`;
      return;
    }

    if(!r){
      strip+=`<div class="day-btn day-btn-empty" id="day-btn-${idx}">
        <div class="db-name">${dayShort(dateStr)}</div>
        <div class="db-date">${shortDate(dateStr)}</div>
        <div class="db-no-shift">${isToday?'In progress':'No shift'}</div>
      </div>`;
      return;
    }
    const csAtt=r.cases_planned>0?Math.round((r.cases_produced/r.cases_planned)*100*PE):null;
    const chipCls=csAtt!==null?(csAtt>=90?'db-chip-green':csAtt>=70?'db-chip-amber':'db-chip-red'):'db-chip-gray';
    strip+=`<div class="day-btn${isToday?' day-btn-today':''}" id="day-btn-${idx}" onclick="selectDay(${idx},'${dateStr}')">
      <div class="db-name">${dayShort(dateStr)}${isToday?' ·':''}</div>
      <div class="db-date">${shortDate(dateStr)}</div>
      <div class="db-sup">${r.supervisor||'—'}</div>
      ${csAtt!==null?`<span class="db-chip ${chipCls}">${csAtt}%</span>`:''}
    </div>`;
  });
  strip+='</div>';
  document.getElementById('weekStripArea').innerHTML=strip;

  // Default detail panel
  document.getElementById('detailPanelArea').innerHTML=
    `<div class="detail-panel"><div class="detail-panel-empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      Click a past day for actuals · Click a future day for ML projection.
    </div></div>`;
  selectedDayIdx=null;
}

window.exportCSV = function(){
  if(!currentRows.length) return;
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;

  let rows, headers, filename;

  if(currentType === 'production'){
    // Flatten production: one row per LINE per shift
    headers = [
      'shift_date','supervisor',
      'unsafe_conditions','near_misses','first_aid','safety_comments',
      'shortages','stos',
      'absences','headcount_needed','headcount_present',
      'sap_completed','sap_open','sap_reason',
      'training_notes','quality_notes',
      'shift_lbs_planned','shift_lbs_produced','shift_lbs_variance',
      'shift_cases_planned','shift_cases_produced','shift_cases_variance',
      'line','line_lbs_planned','line_lbs_produced','line_lbs_variance',
      'line_cases_planned','line_cases_produced','line_cases_variance',
      'line_notes'
    ];
    rows = [];
    currentRows.forEach(r=>{
      const lines = Array.isArray(r.lines)?r.lines:(typeof r.lines==='string'?JSON.parse(r.lines||'[]'):[]);
      if(!lines.length){
        // shift with no lines
        rows.push([r.shift_date,r.supervisor,
          r.unsafe_conditions||0,r.near_misses||0,r.first_aid||0,r.safety_comments||'',
          r.shortages||'',r.stos||'',
          r.absences||0,r.headcount_needed||0,r.headcount_present||0,
          r.sap_completed||0,r.sap_open||0,r.sap_reason||'',
          r.training_notes||'',r.quality_notes||'',
          r.lbs_planned||0,r.lbs_produced||0,r.lbs_variance||0,
          r.cases_planned||0,r.cases_produced||0,r.cases_variance||0,
          '','','','','','','',''
        ]);
      } else {
        lines.forEach(l=>{
          rows.push([r.shift_date,r.supervisor,
            r.unsafe_conditions||0,r.near_misses||0,r.first_aid||0,r.safety_comments||'',
            r.shortages||'',r.stos||'',
            r.absences||0,r.headcount_needed||0,r.headcount_present||0,
            r.sap_completed||0,r.sap_open||0,r.sap_reason||'',
            r.training_notes||'',r.quality_notes||'',
            r.lbs_planned||0,r.lbs_produced||0,r.lbs_variance||0,
            r.cases_planned||0,r.cases_produced||0,r.cases_variance||0,
            l.line,l.lbs_planned||0,l.lbs_produced||0,l.lbs_variance||0,
            l.cases_planned||0,l.cases_produced||0,l.cases_variance||0,
            l.notes||''
          ]);
        });
      }
    });
    filename = `production_shifts_${from}_to_${to}.csv`;
  } else {
    headers = [
      'shift_date','supervisor',
      'lbs_planned','lbs_produced','lbs_variance',
      'unsafe_conditions','near_misses','first_aid','safety_comments',
      'headcount_needed','headcount_actual','absences','comments'
    ];
    rows = currentRows.map(r=>[
      r.shift_date,r.supervisor||'',
      r.lbs_planned||0,r.lbs_produced||0,r.lbs_variance||0,
      r.unsafe_conditions||0,r.near_misses||0,r.first_aid||0,r.safety_comments||'',
      r.headcount_needed||0,r.headcount_actual||0,r.absences||0,r.comments||''
    ]);
    filename = `batching_shifts_${from}_to_${to}.csv`;
  }

  const escape = v => {
    const s = String(v==null?'':v).replace(/"/g,'""');
    return (s.includes(',')||s.includes('"')||s.includes('\n')) ? `"${s}"` : s;
  };
  const csv = [headers.join(','), ...rows.map(r=>r.map(escape).join(','))].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
};

        <div class="pr-kpi neutral"><div class="kk">Lbs Planned</div><div class="kv">${n(lbsPl)}</div></div>
        <div class="pr-kpi neutral"><div class="kk">Lbs Produced</div><div class="kv">${n(lbsAc)}</div></div>
        <div class="pr-kpi ${lbsVar>=0?'green':'red'}"><div class="kk">Lbs Variance</div><div class="kv">${lbsVar>0?'+':''}${n(lbsVar)}</div></div>
        <div class="pr-kpi neutral"><div class="kk">Cases Planned</div><div class="kv">${n(csPl)}</div></div>
        <div class="pr-kpi neutral"><div class="kk">Cases Produced</div><div class="kv">${n(csAc)}</div></div>
        <div class="pr-kpi ${csVar>=0?'green':'red'}"><div class="kk">Cases Variance</div><div class="kv">${csVar>0?'+':''}${n(csVar)}</div></div>
        <div class="pr-kpi ${avgAtt!==null?(avgAtt>=90?'green':avgAtt>=70?'amber':'red'):'neutral'}"><div class="kk">Avg Attainment</div><div class="kv">${avgAtt!==null?avgAtt+'%':'—'}</div></div>
      </div></div>`;

    // Per-shift
    currentRows.forEach((r, idx)=>{
      const lv=(r.lbs_produced||0)-(r.lbs_produced||0);
      const cv=(r.cases_produced||0)-(r.cases_planned||0);
      const att=r.cases_planned>0?Math.round((r.cases_produced/r.cases_planned)*100*PE):null;
      html+=`<div class="${idx>0?'pr-shift-break':''} pr-sec">
        <div class="pr-sec-hdr"><div class="bar"></div><span>Shift — ${fD(r.shift_date)} &bull; ${r.supervisor||'—'}</span></div>
        <div class="pr-kpi-row k5">
          <div class="pr-kpi ${parseInt(r.unsafe_conditions)>0?'red':'green'}"><div class="kk">Unsafe</div><div class="kv">${r.unsafe_conditions||0}</div></div>
          <div class="pr-kpi ${parseInt(r.near_misses)>0?'amber':'green'}"><div class="kk">Near Misses</div><div class="kv">${r.near_misses||0}</div></div>
          <div class="pr-kpi ${parseInt(r.first_aid)>0?'red':'green'}"><div class="kk">First Aid</div><div class="kv">${r.first_aid||0}</div></div>
          <div class="pr-kpi neutral"><div class="kk">HC Needed</div><div class="kv">${r.headcount_needed||'—'}</div></div>
          <div class="pr-kpi neutral"><div class="kk">HC Present</div><div class="kv">${r.headcount_present||'—'}</div></div>
        </div>
        <div class="pr-kpi-row k4">
          <div class="pr-kpi neutral"><div class="kk">SAP Completed</div><div class="kv">${r.sap_completed||'—'}</div></div>
          <div class="pr-kpi ${parseInt(r.sap_open)>0?'amber':'green'}"><div class="kk">SAP Open</div><div class="kv">${r.sap_open||0}</div></div>
          <div class="pr-kpi neutral"><div class="kk">Lbs Produced</div><div class="kv">${n(r.lbs_produced)}</div></div>
          <div class="pr-kpi ${att!==null?(att>=90?'green':att>=70?'amber':'red'):'neutral'}"><div class="kk">Attainment</div><div class="kv">${att!==null?att+'%':'—'}</div></div>
        </div>`;
      if(r.safety_comments) html+=`<div class="pr-notes"><div class="nk">Safety</div>${r.safety_comments}</div>`;
      if(r.shortages)        html+=`<div class="pr-notes"><div class="nk">Shortages</div>${r.shortages}</div>`;
      if(r.stos)             html+=`<div class="pr-notes"><div class="nk">STOs</div>${r.stos}</div>`;
      if(r.training_notes)   html+=`<div class="pr-notes"><div class="nk">Training</div>${r.training_notes}</div>`;
      if(r.quality_notes)    html+=`<div class="pr-notes"><div class="nk">Quality</div>${r.quality_notes}</div>`;

      const lines=Array.isArray(r.lines)?r.lines:(typeof r.lines==='string'?JSON.parse(r.lines||'[]'):[]);
      if(lines.length){
        html+=`<table class="pr-table"><thead><tr>
          <th>Line</th><th class="c">Lbs Pl <button class="tt-btn" onclick="showTT(this,'<strong>Lbs Planned</strong><hr>Lbs scheduled for this line.',event)">?</button></th><th class="c">Lbs Ac <button class="tt-btn" onclick="showTT(this,'<strong>Lbs Actual</strong><hr>Lbs produced. Consistently below plan on one line? That line is your bottleneck -- investigate equipment or operator assignment.',event)">?</button></th><th class="c">Lbs Var <button class="tt-btn" onclick="showTT(this,'<strong>Lbs Variance</strong><hr>Actual minus planned. Negative on one line only = isolated issue. Negative across all lines = plant-wide problem.',event)">?</button></th>
          <th class="c">Cs Pl <button class="tt-btn" onclick="showTT(this,'<strong>Cases Planned</strong><hr>Case target for this line.',event)">?</button></th><th class="c">Cs Ac <button class="tt-btn" onclick="showTT(this,'<strong>Cases Actual</strong><hr>Cases produced on this line.',event)">?</button></th><th class="c">Cs Var <button class="tt-btn" onclick="showTT(this,'<strong>Cases Variance</strong><hr>Cases produced minus planned. Negative cases + positive lbs? Product is heavier than expected -- check fill weights.',event)">?</button></th><th class="c">Att. <button class="tt-btn" onclick="showTT(this,'<strong>Line Attainment</strong><hr>(Cs Produced / Cs Planned) x 0.98. 90%+ means line performing well. Under 70% means dragging the shift. High variance across lines? Some lines are not pulling their weight.',event)">?</button></th><th>Notes</th>
        </tr></thead><tbody>`;
        lines.forEach(l=>{
          const isOff=!l.lbs_planned&&!l.lbs_produced&&!l.cases_planned&&!l.cases_produced;
          if(isOff){html+=`<tr><td class="ln">${l.line}</td><td class="lo" colspan="7">Offline</td><td></td></tr>`;return;}
          const lv2=l.lbs_variance||0,cv2=l.cases_variance||0;
          const a2=l.cases_planned>0?Math.round((l.cases_produced/l.cases_planned)*100*PE):null;
          html+=`<tr><td class="ln">${l.line}</td>
            <td class="c">${n(l.lbs_planned)}</td><td class="c">${n(l.lbs_produced)}</td>
            <td class="c ${lv2>=0?'vp':'vn'}">${lv2>=0?'+':''}${n(lv2)}</td>
            <td class="c">${n(l.cases_planned)}</td><td class="c">${n(l.cases_produced)}</td>
            <td class="c ${cv2>=0?'vp':'vn'}">${cv2>=0?'+':''}${n(cv2)}</td>
            <td class="c">${a2!==null?`<span class="badge ${a2>=90?'badge-green':a2>=70?'badge-amber':'badge-red'}">${a2}%</span>`:'—'}</td>
            <td style="font-size:7pt;color:#4a5568">${l.notes||''}</td></tr>`;
        });
        html+=`</tbody></table>`;
      }
      html+=`</div>`;
    });

  } else {
    // Batching print
    let lbsPl=0,lbsAc=0;
    currentRows.forEach(r=>{lbsPl+=r.lbs_planned||0;lbsAc+=r.lbs_produced||0;});
    const att=lbsPl>0?Math.round((lbsAc/lbsPl)*100):null;
    html+=`<div class="pr-sec"><div class="pr-sec-hdr"><div class="bar"></div><span>Period Summary</span></div>
      <div class="pr-kpi-row k3">
        <div class="pr-kpi neutral"><div class="kk">Lbs Planned</div><div class="kv">${n(lbsPl)}</div></div>
        <div class="pr-kpi neutral"><div class="kk">Lbs Produced</div><div class="kv">${n(lbsAc)}</div></div>
        <div class="pr-kpi ${att!==null?(att>=90?'green':att>=70?'amber':'red'):'neutral'}"><div class="kk">Attainment</div><div class="kv">${att!==null?att+'%':'—'}</div></div>
      </div></div>`;
    html+=`<table class="pr-table"><thead><tr>
      <th>Date</th><th>Supervisor</th><th class="c">Lbs Pl <button class="tt-btn" onclick="showTT(this,'<strong>Lbs Planned</strong><hr>Lbs scheduled for this line.',event)">?</button></th><th class="c">Lbs Ac <button class="tt-btn" onclick="showTT(this,'<strong>Lbs Actual</strong><hr>Lbs produced. Consistently below plan on one line? That line is your bottleneck -- investigate equipment or operator assignment.',event)">?</button></th>
      <th class="c">Variance</th><th class="c">Att.</th><th class="c">UC</th><th class="c">NM</th><th class="c">FA</th>
    </tr></thead><tbody>`;
    currentRows.forEach(r=>{
      const lv=(r.lbs_produced||0)-(r.lbs_planned||0);
      const a=r.lbs_planned>0?Math.round((r.lbs_produced/r.lbs_planned)*100):null;
      html+=`<tr>
        <td style="font-family:monospace;font-weight:700">${fD(r.shift_date)}</td>
        <td>${r.supervisor||'—'}</td>
        <td class="c">${n(r.lbs_planned)}</td><td class="c">${n(r.lbs_produced)}</td>
        <td class="c ${lv>=0?'vp':'vn'}">${lv>=0?'+':''}${n(lv)}</td>
        <td class="c">${a!==null?`<span class="badge ${a>=90?'badge-green':a>=70?'badge-amber':'badge-red'}">${a}%</span>`:'—'}</td>
        <td class="c">${r.unsafe_conditions||0}</td><td class="c">${r.near_misses||0}</td><td class="c">${r.first_aid||0}</td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  }

  html+=`<div class="pr-footer"><span>Plant 1730 Ops Hub &bull; Novus Foods, Buena Park CA</span><span>Generated: ${now}</span></div></div>`;
  document.getElementById('printReport').innerHTML = html;
  window.print();
};

// Apply URL param + auto-load after all functions are defined
if(urlType === 'batching'){
  currentType = 'batching';
  document.getElementById('tabProd').classList.remove('active');
  document.getElementById('tabBatch').classList.add('active');
}
loadShifts();

})();
// ── Tooltip engine ──
(function(){
  const pop = document.createElement('div');
  pop.className = 'tt-pop';
  pop.id = 'ttPop';
  document.body.appendChild(pop);
  let activeBtn = null;

  window.showTT = function(btn, html, event){
    event.stopPropagation();
    if(activeBtn === btn && pop.classList.contains('visible')){
      pop.classList.remove('visible'); activeBtn = null; return;
    }
    activeBtn = btn;
    pop.innerHTML = html;
    pop.classList.add('visible');
    const r = btn.getBoundingClientRect();
    const pw = 280, ph = pop.offsetHeight || 160;
    let left = r.left + r.width/2 - pw/2;
    let top  = r.top - ph - 10;
    if(left < 8) left = 8;
    if(left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if(top < 8) top = r.bottom + 10;
    pop.style.left = left + 'px';
    pop.style.top  = top  + 'px';
    pop.style.width = pw  + 'px';
  };

  document.addEventListener('click', function(e){
    if(!e.target.closest('.tt-btn')){ pop.classList.remove('visible'); activeBtn = null; }
  });
})();

</script>
